apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment
  template:
    metadata:
      labels:
        app: payment
    spec:
      containers:
      - name: payment
        image: hashicorp/http-echo
        args: ["-text=payment ok"]
        imagePullPolicy: IfNotPresent
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
spec:
  selector:
    app: paymentt
  ports:
  - port: 5678
    targetPort: 5678
