apiVersion: apps/v1
kind: Deployment
metadata:
  name: broken-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: broken
  template:
    metadata:
      labels:
        app: broken
    spec:
      containers:
      - name: broken
        image: nginx:latest
        command: ["/bin/sh", "-c", "while true; do sleep 30; done"]
        imagePullPolicy: IfNotPresent
