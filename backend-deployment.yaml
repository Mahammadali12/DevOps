apiVersion: apps/v1
kind: Deployment 
metadata:
  name: backend-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: hashicorp/http-echo
          ports:
          - containerPort: 5678
          imagePullPolicy: IfNotPresent
          args:
          - "-text=Hello from backend"
